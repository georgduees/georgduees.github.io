<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Support Flow Overview</title>
  <desc id="desc">Simple visual flow from issue intake to knowledge sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8efff"/>
      <stop offset="100%" stop-color="#edf7ef"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect x="90" y="220" rx="20" ry="20" width="240" height="120" fill="#ffffff" stroke="#c9d7f5"/>
  <rect x="480" y="220" rx="20" ry="20" width="240" height="120" fill="#ffffff" stroke="#c9d7f5"/>
  <rect x="870" y="220" rx="20" ry="20" width="240" height="120" fill="#ffffff" stroke="#c9d7f5"/>
  <path d="M330 280 H480" stroke="#4b6fb8" stroke-width="6" stroke-linecap="round"/>
  <path d="M720 280 H870" stroke="#4b6fb8" stroke-width="6" stroke-linecap="round"/>
  <text x="210" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#1f2937">Case Intake</text>
  <text x="600" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#1f2937">Deep Analysis</text>
  <text x="990" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#1f2937">Knowledge Share</text>
  <text x="600" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#1f2937">From Incident to Reusable Knowledge</text>
</svg>