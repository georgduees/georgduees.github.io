<header class="post-header">
  <h1 class="post-heading">{{ page.title }}</h1>
  <p class="post-meta-line">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
    {% if page.author %}
      <span> · {{ page.author }}</span>
    {% endif %}
  </p>
  {% if page.image %}
    <img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  {% endif %}
</header>
