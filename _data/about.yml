title: "About Georg"
intro_title: "Training & Community Advocate"
intro_text: "As a passionate IT Support Engineer with 10 years of experience, I'm driven by a mission to empower teams and communities through knowledge sharing and process optimization. My focus lies in bridging the gap between technical excellence and accessible learning."
what_i_do_title: "What I Do"
cards:
  - title: "🎓 Training & Development"
    text: "Design and deliver comprehensive training programs, workshops, and materials to upskill support teams and extend expertise across organizations."
  - title: "🏘️ Community Building"
    text: "Active contributor to professional communities and knowledge networks. Speaker at industry events sharing best practices, insights, and practical solutions."
  - title: "📚 Knowledge Management"
    text: "KCS-certified specialist in building scalable knowledge systems. Creator of self-service content and documentation that reduces support costs and empowers users."
  - title: "🔧 Process Optimization"
    text: "Developer of tools and frameworks that streamline support workflows, improve efficiency, and enable teams to focus on what matters most."
