title: "About Georg"
intro_title: "Training and Community"
intro_text: "As an IT Support Engineer with 10 years of experience, my mission is to empower teams and communities through knowledge sharing and better processes. My focus is to bridge technical excellence with accessible learning."
what_i_do_title: "What I Do"
cards:
  - title: "Training and Development"
    text: "I design and deliver training programs, workshops, and learning materials that help support teams build skills in a structured way."
  - title: "Community Building"
    text: "I actively contribute to professional communities and share best practices as a speaker at events and in knowledge-sharing formats."
  - title: "Knowledge Management"
    text: "As a KCS-certified specialist, I build scalable knowledge systems and self-service content that empower users and reduce support effort."
  - title: "Process Optimization"
    text: "I create practical tools and structures that simplify support workflows and help teams focus on high-impact work."
