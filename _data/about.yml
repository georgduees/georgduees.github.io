beyond_title: "Beyond Work"
beyond_text: "When I am not creating training content or speaking at community events, I am experimenting with Arduino projects, exploring Linux systems, or discovering great food. Learning is a lifelong process for me, and I enjoy sharing new insights with others."
cta_title: "Let Us Connect"
cta_text: "Interested in collaborating on training initiatives, community projects, or knowledge-sharing work? I would love to connect."
