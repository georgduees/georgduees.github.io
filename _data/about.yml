title: "Ueber Georg"
intro_title: "Training und Community"
intro_text: "Als IT Support Engineer mit 10 Jahren Erfahrung ist es mein Ziel, Teams und Communities durch Wissensaustausch und bessere Prozesse zu staerken. Mein Fokus liegt darauf, technische Qualitaet mit leicht zugaenglichem Lernen zu verbinden."
what_i_do_title: "Was ich mache"
cards:
  - title: "🎓 Training und Entwicklung"
    text: "Ich konzipiere und begleite Trainings, Workshops und Lernunterlagen, damit Support-Teams ihre Faehigkeiten systematisch ausbauen."
  - title: "🏘️ Community-Aufbau"
    text: "Ich engagiere mich in Fach-Communities und teile Best Practices als Speaker auf Events und in Formaten zum Wissenstransfer."
  - title: "📚 Wissensmanagement"
    text: "Als KCS-zertifizierter Spezialist entwickle ich skalierbare Wissenssysteme und Self-Service-Inhalte, die Nutzer staerken und Support entlasten."
  - title: "🔧 Prozessoptimierung"
    text: "Ich entwickle pragmatische Tools und Strukturen, die Support-Ablaufe vereinfachen und Teams mehr Fokus auf Wertschoepfung geben."
skills_title: "Schwerpunkte"
skills:
  - "Linux Administration"
  - "Knowledge-Centered Service (KCS)"
  - "Technical Training"
  - "Community Engagement"
  - "Process Design"
  - "Coaching & Mentoring"
  - "Technical Documentation"
  - "Customer Success"
beyond_title: "Abseits der Arbeit"
beyond_text: "Wenn ich nicht an Trainingsinhalten arbeite oder bei Community-Events spreche, experimentiere ich mit Arduino-Projekten, Linux-Systemen oder probiere gutes Essen aus. Lernen ist fuer mich ein lebenslanger Prozess und ich teile neue Erkenntnisse gern mit anderen."
cta_title: "Lass uns vernetzen"
cta_text: "Interesse an gemeinsamer Arbeit rund um Training, Community-Projekte oder Wissenstransfer? Ich freue mich auf den Austausch."
