  - "Customer Success"
beyond_title: "Beyond Work"
beyond_text: "When I'm not crafting training materials or speaking at community events, you'll find me exploring Arduino projects, experimenting with Linux systems, or discovering the best Middle Eastern cuisine. I believe that learning is a lifelong journey, and I'm always excited to explore new technologies and share what I discover."
cta_title: "Let's Connect"
cta_text: "Interested in collaborating on training initiatives, community projects, or knowledge-sharing endeavors? I'd love to hear from you."
